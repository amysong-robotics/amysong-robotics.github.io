        highlights:
          - "Deployed Fast-Planner on ROS for real-time, kinodynamically feasible trajectory generation in obstacle environments."
          - "Engineered a custom RViz benchmark track to validate autonomous waypoint traversal and obstacle avoidance."
      - name: "ROS2-Based Mobile Manipulator"
        start_date: "2025-09"
        end_date: "2025-12"
        summary: "Project Leader | Advisor: Prof. Wende Ke"
        highlights:
          - "Architected a two-wheeled differential drive mobile base with a 4-DOF manipulator in SolidWorks and URDF."
          - "Deployed ROS2 Nav2, LiDAR SLAM, and Visual Servoing, achieving ±5 mm horizontal alignment accuracy."
          - "Implemented multimodal HRI using MediaPipe and Vosk API."
      - name: "Sim-to-Real Infrastructure for Dexterous Hand"
        start_date: "2025-07"
        end_date: "2025-11"
        summary: "Undergraduate Researcher | Advisor: Prof. Zhao Tang"
        highlights:
          - "Refined a multi-fingered robotic palm URDF and established robust simulation environments in Webots and Isaac Sim."
          - "Configured contact dynamics for future Reinforcement Learning (RL) grasping policy training."
      - name: "Autonomous Intelligent Rescue Vehicle"
        start_date: "2024-11"
        end_date: "2025-08"
        summary: "Project Leader | Advisors: Prof. Dong Lu, Yuanjian Huang"
        highlights:
          - "Programmed STM32 for visual telemetry and deployed a custom YOLOv11 model for real-time object detection."
          - "Led the team to win the National Second Prize and Provincial First Prize."
      - name: "CV-Guided 6-DOF Robotic Sketching System"
        start_date: "2024-03"
        end_date: "2024-06"
        summary: "Project Leader | Advisor: Prof. Chenglong Fu"
        highlights:
          - "Engineered an OpenCV vision pipeline for sub-pixel contour extraction and continuous toolpath generation."
          - "Solved 6-DOF inverse kinematics via D-H parameters for high-precision physical sketching."

