- title: Research & Projects
  type: time_table
  contents:
    - title: Slope Center-of-Mass (CoM) Assistance System for Human Gait
      institution: Advisor - Prof. Chenglong Fu
      year: 2025 - Present
      description:
        - Designed an experimental testbed to deliver dynamic traction (200 N peak) with <5% force error.
        - Developed STM32-based control for high-fidelity motor torque regulation; achieved 20-30% reduction in metabolic cost.
    - title: Autonomous UAV Mission Navigation via Fast-Planner
      institution: Advisor - Prof. Boyu Zhou
      year: 2025
      description:
        - Deployed Fast-Planner on ROS for real-time trajectory generation in randomized point-cloud environments.
        - Engineered custom circular benchmark tracks in RViz to validate obstacle avoidance and trajectory smoothing.
    - title: ROS2-Based Mobile Manipulator with Multimodal HRI
      institution: Advisor - Prof. Wende Ke
      year: 2025
      description:
        - Architected a ROS2 mobile manipulator with SLAM and Nav2; integrated EKF for robust sensor fusion.
        - Developed HRI interface using MediaPipe for gesture recognition and Vosk for offline voice commands.
    - title: Sim-to-Real Infrastructure for Closed-Loop Dexterous Hand
      institution: Advisor - Prof. Zhao Tang
      year: 2025
      description:
        - Refined URDF models and kinematic constraints for high-fidelity physics engines (NVIDIA Isaac Sim, Webots).
        - Established RL grasping pipelines designed for future Sim-to-Real policy transfer experiments.
    - title: Autonomous Intelligent Rescue Vehicle (National Competition)
      institution: Advisor - Prof. Dong Lu
      year: 2024 - 2025
      description:
        - Won National Second Prize. Programmed STM32 FSM for chassis kinematics and servo grasping.
        - Trained and deployed YOLOv11 object detection model for real-time multi-class recognition.
    - title: CV-Guided 6-DOF Robotic Sketching System
      institution: Advisor - Prof. Chenglong Fu
      year: 2024
      description:
        - Developed OpenCV pipeline for sub-pixel contour extraction and solved 6-DOF IK via D-H parameters.
        - Expanded framework to generate 3D spatial trajectories for curved surfaces (e.g., cylinders) within Simulink.

